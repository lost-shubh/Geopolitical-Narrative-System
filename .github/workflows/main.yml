name: Publish Live Snapshot

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch news
        run: |
          curl "https://newsapi.org/v2/everything?q=${{ vars.GNS_LIVE_QUERY }}&pageSize=${{ vars.GNS_MAX_ARTICLES }}&apiKey=${{ secrets.NEWS_API_KEY }}" \
          -o data.json

      - name: Upload to Vercel Blob
        run: |
          RESPONSE=$(curl -X PUT "https://blob.vercel-storage.com/dashboard/live/latest.json?allowOverwrite=true" \
          -H "Authorization: Bearer ${{ secrets.BLOB_READ_WRITE_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data-binary @data.json)
          echo "✅ Blob URL: $RESPONSE"
